# MTA-STS vhosts - HTTP only for now (certbot will upgrade to HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name mta-sts.hub-travelers.com;
    root /var/www/mta-sts/hub-travelers.com;
    location /.well-known/acme-challenge/ { allow all; }
    location / { try_files $uri =404; }
}
