name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - 'sos/cloudflare-worker/**'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    name: Deploy Worker to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        working-directory: sos/cloudflare-worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: fe7c0b2676e091898d565b8eba1544ad

      - name: Purge Cloudflare Edge Cache
        if: success()
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo "Edge cache purged"

      - name: Invalidate SSR Firestore Cache
        if: success()
        run: |
          curl -s -X POST \
            "https://europe-west1-sos-urgently-ac307.cloudfunctions.net/invalidateCacheEndpoint" \
            -H "x-cache-invalidation-key: ${{ secrets.CACHE_INVALIDATION_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{"clearAll":true}'
          echo "SSR Firestore cache invalidated"

      - name: Warm SSR Cache (priority pages)
        if: success()
        working-directory: sos
        run: node scripts/warm-ssr-cache.js
        timeout-minutes: 15
